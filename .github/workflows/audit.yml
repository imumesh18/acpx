name: Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: cargo install cargo-deny --locked
      - run: cargo deny check
